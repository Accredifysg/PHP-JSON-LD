name: CI

on:
  workflow_call:
    outputs:
      backend-coverage-artifact-name:
        description: "Name of the uploaded backend coverage artifact"
        value: ${{ jobs.coverage.outputs.backend-coverage-artifact-name }}
      backend-junit-artifact-name:
        description: "Name of the uploaded backend JUnit test report artifact"
        value: ${{ jobs.coverage.outputs.backend-junit-artifact-name }}

jobs:
  test:
    name: Unit · PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run Pint (code style)
        run: vendor/bin/pint --test

      - name: Run PHPStan (static analysis)
        run: vendor/bin/phpstan analyse --no-progress

      - name: Run Pest (unit tests)
        run: composer test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    outputs:
      backend-coverage-artifact-name: coverage-report
      backend-junit-artifact-name: junit-report

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: pcov
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-8.3-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-8.3-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Generate code coverage
        run: vendor/bin/pest --testsuite=Unit --coverage-clover=coverage/clover.xml --log-junit=coverage/junit.xml

      - name: Normalize report paths
        run: sed -i "s|${GITHUB_WORKSPACE}/||g" coverage/clover.xml coverage/junit.xml

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/clover.xml
          if-no-files-found: error

      - name: Upload JUnit Report
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: coverage/junit.xml
          if-no-files-found: error

  conformance:
    name: W3C Conformance
    runs-on: ubuntu-latest
    # Gating. The 14 known blockers (7 expand, 7 toRdf) are an explicit
    # expected-failure allowlist in tests/W3c/KnownBlockers.php, so the suite
    # exits 0. Any NEW conformance regression — or a listed blocker that starts
    # passing — fails this job.

    steps:
      - name: Checkout (with W3C submodule)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run W3C JSON-LD 1.1 test suite
        run: composer test:w3c
